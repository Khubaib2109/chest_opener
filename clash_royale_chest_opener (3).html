function save(){localStorage.setItem('chestRoyaleMobileV1',JSON.stringify(state))}function weighted(arr){let t=arr.reduce((s,i)=>s+(i.chance??i[1]),0),r=Math.random()*t;for(const it of arr){r-=it.chance??it[1];if(r<=0)return it}return arr[0]}function starText(n){return'вҳ…'.repeat(n)+'вҳҶ'.repeat(5-n)}function rand(a){return a[Math.floor(Math.random()*a.length)]}function choose(r){let pool=cards.filter(c=>c.rarity===r);return rand(pool.length?pool:cards)}function toast(m){$('toast').textContent=m;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1800)}function stats(){$('chestCount').textContent=state.chests;$('goldCount').textContent=state.gold.toLocaleString();$('cardCount').textContent=Object.values(state.owned).reduce((s,v)=>s+v,0).toLocaleString();$('bestChest').textContent=state.bestChest+'вҳ…'}function cardEl(c,amt){let e=document.createElement('div');e.className='card '+(c.rarity==='hero'||c.rarity==='evo'?'champion':c.rarity);e.innerHTML=`<div class="rarity">${c.rarity}</div><div class="card-art">${c.emoji}</div><div class="card-name">${c.name}</div><div class="card-count">x${amt.toLocaleString()}</div>`;return e}function render(){let g=$('collectionGrid');g.innerHTML='';cards.filter(c=>filter==='all'||(filter==='owned'?(state.owned[c.name]||0)>0:c.rarity===filter)).forEach(c=>{let n=state.owned[c.name]||0,d=document.createElement('div');d.className='mini '+(n?'':'locked');d.innerHTML=`<div class="mini-rarity">${c.rarity}</div><div class="emoji">${c.emoji}</div><div class="name">${c.name}</div><div class="owned">${n?'x'+n.toLocaleString():'Locked'}</div>`;g.appendChild(d)})}function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
async function openChest(){
  if(opening)return;
  opening=true;
  $('openButton').disabled=true;
  $('openButton').textContent='Opening...';
  $('result').textContent='The chest is upgrading...';
  $('revealArea').innerHTML='';
  $('chestLabel').textContent='Mystery Lucky Chest';
  $('stars').textContent='?????';
  $('chest').classList.remove('open');
  $('chest').classList.add('shake');
  $('glow').classList.remove('active');

  await sleep(500);

  const stars=weighted(chestStarChances).stars;
  const starBox=$('stars');
  for(let i=1;i<=stars;i++){
    starBox.textContent=starText(i);
    $('result').textContent=i<stars?'Upgrade! Keep going...':'Final rarity locked in!';
    toast(i===stars?`${stars}-STAR CHEST!`:`Upgraded to ${i}вҳ…`);
    if(i>=4){document.body.classList.add('flash');setTimeout(()=>document.body.classList.remove('flash'),500)}
    await sleep(i>=4?520:360);
  }

  $('chest').classList.remove('shake');
  $('chest').classList.add('open');
  $('glow').classList.add('active');
  state.chests++;
  state.bestChest=Math.max(state.bestChest,stars);
  $('chestLabel').textContent=stars+'-Star Lucky Chest';
  await sleep(620);

  let type=weighted(rewardChances[stars])[0];
  if(type==='gold'){
    const amt=amounts[stars].gold;
    state.gold+=amt;
    $('result').textContent=`${stars}вҳ… chest reward: ${amt.toLocaleString()} gold`;
    toast('Gold +'+amt.toLocaleString());
  }else{
    const c=choose(type),amt=amounts[stars][type];
    state.owned[c.name]=(state.owned[c.name]||0)+amt;
    const stage=document.createElement('div');
    stage.className='spin-stage';
    const el=cardEl(c,amt);
    stage.appendChild(el);
    $('revealArea').appendChild(stage);
    requestAnimationFrame(()=>el.classList.add('show'));
    $('result').textContent=`${stars}вҳ… chest reward: ${c.name} x${amt.toLocaleString()}`;
    toast(type.toUpperCase()+'! '+c.name);
    if(['legendary','champion','hero','evo'].includes(type)){document.body.classList.add('flash');setTimeout(()=>document.body.classList.remove('flash'),850)}
  }
  save();stats();render();
  await sleep(1450);
  $('chest').classList.remove('open');
  $('openButton').disabled=false;
  $('openButton').textContent='Open Another Mystery Chest';
  opening=false;
}
$('openButton').onclick=openChest;$('chest').onclick=openChest;$('chest').onkeydown=e=>{if(e.key==='Enter'||e.key===' ')openChest()};$('filters').onclick=e=>{let b=e.target.closest('button[data-filter]');if(!b)return;filter=b.dataset.filter;document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()};$('resetButton').onclick=()=>{if(!confirm('Reset your collection?'))return;state={chests:0,gold:0,owned:{},bestChest:0};save();$('revealArea').innerHTML='';$('result').textContent='Ready.';$('chestLabel').textContent='Mystery Lucky Chest';$('stars').textContent='?????';stats();render();toast('Reset complete')};stats();render();
</script></body></html>
